{% extends "base.html" %}
{% block title %}Post a Job — JobVerse{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">
      <div class="auth-card">
        <div class="auth-header mb-4">
          <div class="auth-icon mb-3"><i class="bi bi-plus-circle-fill"></i></div>
          <h2 class="fw-bold">Post a New Job</h2>
          <p class="text-muted">Fill in the details to reach qualified candidates</p>
        </div>
        <form method="POST" novalidate>
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label fw-semibold">Job Title <span class="text-danger">*</span></label>
              <input name="title" class="form-control" placeholder="e.g. Senior Python Developer" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Company Name <span class="text-danger">*</span></label>
              <input name="company" class="form-control" placeholder="Your company name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Location <span class="text-danger">*</span></label>
              <input name="location" class="form-control" placeholder="e.g. New York, NY or Remote" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Salary <span class="text-danger">*</span></label>
              <input name="salary" class="form-control" placeholder="e.g. $80,000 - $100,000/yr" required>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Category</label>
              <select name="category" class="form-select">
                {% for val, lbl in categories %}
                <option value="{{ val }}">{{ lbl }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-semibold">Job Type</label>
              <select name="job_type" class="form-select">
                {% for val, lbl in job_types %}
                <option value="{{ val }}">{{ lbl }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="col-12">
              <label class="form-label fw-semibold">Job Description <span class="text-danger">*</span></label>
              <textarea name="description" class="form-control" rows="7"
                placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
            </div>
          </div>
          <div class="d-flex gap-3 mt-4">
            <button type="submit" class="btn btn-primary btn-lg fw-semibold flex-fill">
              <i class="bi bi-send-fill me-2"></i>Post Job
            </button>
            <a href="{% url 'employer_dashboard' %}" class="btn btn-outline-secondary btn-lg">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
