{% extends 'base.html' %}

{% block content %}

<h2>Employer Dashboard</h2>

<table class="table">

<tr>

<th>Job Title</th>
<th>Company</th>
<th>Location</th>

</tr>

{% for job in jobs %}

<tr>

<td>{{job.title}}</td>
<td>{{job.company}}</td>
<td>{{job.location}}</td>

</tr>

{% endfor %}

</table>

{% endblock %}
