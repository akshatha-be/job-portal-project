{% extends "base.html" %}
{% block title %}Login — JobVerse{% endblock %}
{% block content %}
<div class="auth-page py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="auth-card">
          <div class="auth-header text-center mb-4">
            <div class="auth-icon mb-3"><i class="bi bi-shield-lock-fill"></i></div>
            <h2 class="fw-bold">Welcome Back</h2>
            <p class="text-muted">Sign in to your JobVerse account</p>
          </div>
          <form method="POST" novalidate>
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Your username" required autofocus>
              </div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Your password" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 btn-lg fw-semibold">Sign In</button>
          </form>
          <p class="text-center mt-4 text-muted">Don't have an account? <a href="{% url 'register' %}" class="fw-semibold">Register</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
